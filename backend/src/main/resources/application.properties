spring.application.name=campus-management-system
server.port=8080

# Database
spring.datasource.url=jdbc:h2:file:./data/campus_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Secret (should be in env var in production)
jwt.secret=your_very_secret_key_that_should_be_long_enough_for_hs512_algorithm
jwt.expiration=86400000
